name: Build E8450 SSR Firmware

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev \
            libssl-dev python3 rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git
          cd immortalwrt
          echo "src-git helloworld https://github.com/fw876/helloworld" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd immortalwrt
          cat >> .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_mt7622=y
          CONFIG_TARGET_mediatek_mt7622_DEVICE_linksys_e8450-ubi=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y

          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_shadowsocksr-libev-ssr-local=y
          CONFIG_PACKAGE_shadowsocksr-libev-ssr-redir=y

          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_iptables-mod-tproxy=y
          CONFIG_PACKAGE_kmod-ipt-tproxy=y
          EOF
          make defconfig

      - name: Build
        run: |
          cd immortalwrt
          make download -j8 || make download -j1 V=s
          make -j"$(nproc)" || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: immortalwrt/bin/targets/mediatek/mt7622/
