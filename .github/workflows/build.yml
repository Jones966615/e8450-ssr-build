name: Build E8450 SSR Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Prepare environment
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone ImmortalWrt
      run: |
        git clone https://github.com/immortalwrt/immortalwrt.git
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Add SSR feed (helloworld)
      run: |
        cd immortalwrt
        echo "src-git helloworld https://github.com/fw876/helloworld" >> feeds.conf.default
        ./scripts/feeds update helloworld
        ./scripts/feeds install -a -p helloworld

    - name: Configure
      run: |
        cd immortalwrt
        cat >> .config << 'EOF'
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_mt7622=y
        CONFIG_TARGET_mediatek_mt7622_DEVICE_linksys_e8450-ubi=y
    
        # SSR核心（必须）
        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_shadowsocksr-libev-ssr-local=y
        CONFIG_PACKAGE_shadowsocksr-libev-ssr-redir=y
    
        # DNS组件（稳定）
        CONFIG_PACKAGE_chinadns-ng=y
    
        # 去掉问题包（关键）
        # CONFIG_PACKAGE_dns2socks is not set
        # CONFIG_PACKAGE_microsocks is not set
        # CONFIG_PACKAGE_tcping is not set
    
        CONFIG_PACKAGE_iptables-mod-tproxy=y
        CONFIG_PACKAGE_kmod-ipt-tproxy=y
        EOF
    
        make defconfig

    - name: Build
      run: |
        cd immortalwrt
        make -j$(nproc)

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: immortalwrt/bin/targets/mediatek/mt7622/
